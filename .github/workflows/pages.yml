name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          AACE3B: ${{ secrets.AACE3B }}
          B4CC3E: ${{ secrets.B4CC3E }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AACE3B', '')
          meta_b = os.environ.get('B4CC3E', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 2fd1bcbae856752e0e9abcb985bfc5 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 481144f95f5c6a3931a006361ef3 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
